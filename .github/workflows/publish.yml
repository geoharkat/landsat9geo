# ============================================================
#  landsat9geo — Automated Release Pipeline
#  Triggers on semantic-version tags: 1.2.3 / 1.2.3a1 / etc.
# ============================================================

name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PACKAGE_NAME: "landsat9geo"
  OWNER:        "geoharkat"
  TAP_NAME:     "homebrew-tap"
  PYTHON_VER:   "3.12"

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1 — Parse tag
  # ═══════════════════════════════════════════════════════════
  details:
    name: "📋 Parse tag"
    runs-on: ubuntu-latest
    outputs:
      new_version:   ${{ steps.release.outputs.new_version }}
      suffix:        ${{ steps.release.outputs.suffix }}
      tag_name:      ${{ steps.release.outputs.tag_name }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}

    steps:
      - name: Extract and validate tag
        id: release
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          
          if ! echo "$TAG_NAME" | grep -qP '^\d+\.\d+\.\d+(a\d+|b\d+|rc\d+)?$'; then
            echo "::error::Tag '$TAG_NAME' does not match expected semver pattern."
            exit 1
          fi

          NEW_VERSION=$(echo "$TAG_NAME" | grep -oP '^\d+\.\d+\.\d+')
          SUFFIX=$(echo "$TAG_NAME"      | grep -oP '(a|b|rc)\d+' || true)
          IS_PRERELEASE="false"
          [ -n "$SUFFIX" ] && IS_PRERELEASE="true"

          echo "new_version=$NEW_VERSION"      >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX"                >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME"            >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE"  >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Confirm version is newer than PyPI
  # ═══════════════════════════════════════════════════════════
  check_pypi:
    name: "🔍 Check PyPI version"
    needs: details
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest version from PyPI
        id: pypi
        run: |
          RESPONSE=$(curl -sf "https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json" || echo "{}")
          echo "response=$RESPONSE" >> "$GITHUB_STATE"
          
          LATEST=$(echo "$RESPONSE" | jq -r '
            select(.releases != null)
            | .releases | keys
            | map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]")))
            | sort
            | last // "0.0.0"
          ')
          echo "pypi_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Assert new version doesn't exist and is greater
        run: |
          NEW="${{ needs.details.outputs.tag_name }}"
          OLD="${{ steps.pypi.outputs.pypi_version }}"
          
          # Check exact version doesn't exist
          if echo "$RESPONSE" | jq -e ".releases.\"$NEW\"" > /dev/null 2>&1; then
            echo "::error::Version $NEW already exists on PyPI!"
            exit 1
          fi
          
          # Compare base versions
          NEW_BASE="${{ needs.details.outputs.new_version }}"
          OLD_BASE=$(echo "$OLD" | grep -oP '^\d+\.\d+\.\d+' || echo "0.0.0")
          HIGHER=$(printf '%s\n%s' "$OLD_BASE" "$NEW_BASE" | sort -V | tail -1)
          
          if [ "$HIGHER" != "$NEW_BASE" ]; then
            echo "::error::$NEW_BASE is not greater than PyPI version $OLD_BASE."
            exit 1
          fi
          echo "✅ $NEW > $OLD_BASE — proceeding."

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — Lint + type-check gate
  # ═══════════════════════════════════════════════════════════
  quality:
    name: "🔬 Code quality"
    needs: details
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      # FIX: install ruff only here; mypy added below only if needed
      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      # Opt-in mypy — only runs if config exists in the repo
      - name: Mypy type check
        run: |
          if [ -f "mypy.ini" ] || { [ -f "pyproject.toml" ] && grep -q "\[tool.mypy\]" pyproject.toml; }; then

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — Tests (matrix)
  # ═══════════════════════════════════════════════════════════
  test:
    name: "🧪 Test (${{ matrix.os }} / py${{ matrix.python }})"
    needs: details
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:     [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install package + test deps
        run: |
          if pip install ".[dev]" 2>/dev/null; then
            echo "Installed with [dev] extras"
          else
            echo "[dev] extras not found, installing base + test deps"
            pip install -e .
            pip install pytest pytest-cov
          fi
      - name: Check for test files
        id: check_tests
        shell: bash
        run: |
          if [ -d "tests" ] && [ "$(ls tests/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "has_tests=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No test files found — skipping pytest."
          fi

      - name: Run tests with coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=landsat9geo \
            --cov-report=term-missing

          # NOTE: --cov-fail-under removed intentionally.
          # Add it back once coverage grows: --cov-fail-under=60

      - name: Smoke test — import
        run: python -c "import landsat9geo; print('Import OK')"

      - name: Upload coverage (Ubuntu / 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — Build wheel + sdist
  # ═══════════════════════════════════════════════════════════
  build:
    name: "🏗️  Build distributions"
    needs: [details, check_pypi, quality, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # ← KEEP: needed for git tag history

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install build tools
        run: pip install hatch hatchling hatch-vcs build twine

      - name: Install package with all extras
        run: pip install ".[dev,viz]" 2>/dev/null || pip install ".[dev]"

      # FIX: guard CLI smoke-test — not every package has a CLI entry point
      - name: Smoke-test CLI entry point
        run: |
          if command -v landsat9geo &> /dev/null; then
            landsat9geo --help
          else
            echo "::notice::No CLI entry point defined — skipping smoke test."
          fi

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify distributions with twine
        run: twine check --strict dist/*

      - name: Record artifact names
        id: artifacts
        run: |
          WHEEL=$(ls dist/*.whl    | head -1)
          SDIST=$(ls dist/*.tar.gz | head -1)
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "sdist=$SDIST" >> "$GITHUB_OUTPUT"
          echo "Built: $WHEEL  |  $SDIST"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 6 — Publish to PyPI (OIDC trusted publisher)
  # ═══════════════════════════════════════════════════════════
  pypi_publish:
    name: "🚀 Publish → PyPI"
    needs: [build, details]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: "https://pypi.org/project/${{ env.PACKAGE_NAME }}/${{ needs.details.outputs.tag_name }}/"
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ═══════════════════════════════════════════════════════════
  # JOB 7 — Create GitHub Release
  # ═══════════════════════════════════════════════════════════
  github_release:
    name: "📦 GitHub Release"
    needs: [build, details]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.details.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ needs.details.outputs.tag_name }}" dist/* \
            --title "v${{ needs.details.outputs.tag_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG

  # ═══════════════════════════════════════════════════════════
  # JOB 8 — Dispatch Homebrew tap update
  # ═══════════════════════════════════════════════════════════
  bump_homebrew_formula:
    name: "🍺 Update Homebrew tap"
    needs: [details, github_release, pypi_publish]
    runs-on: ubuntu-latest
    if: needs.details.outputs.is_prerelease != 'true'  # ← Skip for pre-releases
    environment:
      name: release

    steps:
      - name: Compute formula payload
        id: formula
        run: |
          TAG="${{ needs.details.outputs.tag_name }}"
          URL="https://github.com/${{ env.OWNER }}/${{ env.PACKAGE_NAME }}/releases/download/${TAG}/${{ env.PACKAGE_NAME }}-${TAG}.tar.gz"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"        # ← Use full TAG
          echo "url=$URL"     >> "$GITHUB_OUTPUT"
          echo "name=${{ env.PACKAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Dispatch update to Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BREW_TAP_TOKEN }}
          repository: ${{ env.OWNER }}/${{ env.TAP_NAME }}
          event-type: "update-formula"
          client-payload: |
            {
              "formula_name":    "${{ steps.formula.outputs.name }}",
              "formula_version": "${{ steps.formula.outputs.version }}",
              "formula_url":     "${{ steps.formula.outputs.url }}"
            }

  # ═══════════════════════════════════════════════════════════
  # JOB 9 — Notify on failure
  # FIX: brew job removed from needs — a missing BREW_TAP_TOKEN
  # should not trigger a false "release failed" notification
  # ═══════════════════════════════════════════════════════════
  notify_failure:
    name: "🔔 Notify on failure"
    needs:
      - details
      - check_pypi
      - quality
      - test
      - build
      - pypi_publish
      - github_release
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ Release pipeline failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field  | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag    | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\`     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor  | @${{ github.actor }}     |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "👉 [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"