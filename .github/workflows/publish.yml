# ============================================================
#  landsat9geo — Automated Release Pipeline
#  Triggers on semantic-version tags: 1.2.3 / 1.2.3a1 / etc.
# ============================================================

name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

# ── Security: grant only what each job needs ──────────────────
permissions:
  contents: read          # default; jobs override as needed

# ── Prevent concurrent releases for the same tag ─────────────
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish in flight

# ── Shared constants ─────────────────────────────────────────
env:
  PACKAGE_NAME: "landsat9geo"
  OWNER:        "geoharkat"
  TAP_NAME:     "homebrew-tap"
  PYTHON_VER:   "3.12"

# ═════════════════════════════════════════════════════════════
# JOB 1 — Parse the tag and validate semver
# ═════════════════════════════════════════════════════════════
jobs:
  details:
    name: "📋 Parse tag"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      suffix:      ${{ steps.release.outputs.suffix }}
      tag_name:    ${{ steps.release.outputs.tag_name }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}

    steps:
      - name: Extract and validate tag
        id: release
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::Workflow triggered without a tag — aborting."
            exit 1
          fi

          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Strict semver check (with optional pre-release suffix)
          if ! echo "$TAG_NAME" | grep -qP '^\d+\.\d+\.\d+(a\d+|b\d+|rc\d+)?$'; then
            echo "::error::Tag '$TAG_NAME' does not match expected semver pattern."
            exit 1
          fi

          NEW_VERSION=$(echo "$TAG_NAME" | grep -oP '^\d+\.\d+\.\d+')
          SUFFIX=$(echo "$TAG_NAME"      | grep -oP '(a|b|rc)\d+' || true)
          IS_PRERELEASE=$( [ -n "$SUFFIX" ] && echo "true" || echo "false" )

          echo "new_version=$NEW_VERSION"    >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX"              >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME"          >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "✅ Version : $NEW_VERSION"
          echo "✅ Suffix  : ${SUFFIX:-none}"
          echo "✅ Pre-rel : $IS_PRERELEASE"

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Confirm the version is newer than what's on PyPI
  # ═══════════════════════════════════════════════════════════
  check_pypi:
    name: "🔍 Check PyPI version"
    needs: details
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest version from PyPI
        id: pypi
        run: |
          RESPONSE=$(curl -sf "https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json" || echo "{}")
          LATEST=$(echo "$RESPONSE" | jq -r '
            select(.releases != null)
            | .releases | keys
            | map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]")))
            | sort_by(split(".") | map(tonumber))
            | last // "0.0.0"
          ')
          echo "pypi_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest on PyPI: $LATEST"

      - name: Assert new version is strictly greater
        run: |
          NEW="${{ needs.details.outputs.new_version }}"
          OLD="${{ steps.pypi.outputs.pypi_version }}"
          HIGHER=$(printf '%s\n%s' "$OLD" "$NEW" | sort -V | tail -1)
          if [ "$HIGHER" != "$NEW" ] || [ "$NEW" = "$OLD" ]; then
            echo "::error::$NEW is not greater than the PyPI version $OLD."
            exit 1
          fi
          echo "✅ $NEW > $OLD — proceeding."

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — Lint + type-check gate (fast fail before build)
  # ═══════════════════════════════════════════════════════════
  quality:
    name: "🔬 Code quality"
    needs: details
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install quality tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      # ── mypy is opt-in: skip gracefully if no config found ─
      - name: Mypy type check
        run: |
          if [ -f "mypy.ini" ] || grep -q "\[tool.mypy\]" pyproject.toml 2>/dev/null; then
            pip install mypy && mypy landsat9geo/
          else
            echo "No mypy config found — skipping type check."
          fi

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — Tests (matrix: OS × Python version)
  # ═══════════════════════════════════════════════════════════
  test:
    name: "🧪 Test (${{ matrix.os }} / py${{ matrix.python }})"
    needs: details
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:     [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install package + test deps
        run: pip install ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=landsat9geo \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage (Ubuntu / 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — Build wheel + sdist, verify, upload artifact
  # ═══════════════════════════════════════════════════════════
  build:
    name: "🏗️  Build distributions"
    needs: [details, check_pypi, quality, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history for hatch-vcs if used

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install build tools
        run: pip install hatch hatchling build twine

      # ── Stamp the exact tag version into pyproject.toml ───
      # This is the ONLY correct place to mutate the version;
      # the mutation stays local to the CI runner, never pushed.
      - name: Stamp version from tag
        run: hatch version "${{ needs.details.outputs.new_version }}"

      - name: Install package with all extras
        run: pip install ".[dev,viz]"

      - name: Smoke-test CLI entry point
        run: landsat9geo --help

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify distributions with twine
        run: twine check --strict dist/*

      # ── Capture exact filenames for downstream jobs ───────
      - name: Record artifact names
        id: artifacts
        run: |
          WHEEL=$(ls dist/*.whl  | head -1)
          SDIST=$(ls dist/*.tar.gz | head -1)
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "sdist=$SDIST" >> "$GITHUB_OUTPUT"
          echo "Built: $WHEEL  |  $SDIST"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 6 — Publish to PyPI (OIDC trusted publisher)
  # ═══════════════════════════════════════════════════════════
  pypi_publish:
    name: "🚀 Publish → PyPI"
    needs: [build, details]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: "https://pypi.org/project/${{ env.PACKAGE_NAME }}/${{ needs.details.outputs.new_version }}/"
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true   # log SHA256 of each uploaded file

  # ═══════════════════════════════════════════════════════════
  # JOB 7 — Create GitHub Release with auto-generated notes
  # ═══════════════════════════════════════════════════════════
  github_release:
    name: "📦 GitHub Release"
    needs: [build, details]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.details.outputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ needs.details.outputs.tag_name }}" dist/* \
            --title "v${{ needs.details.outputs.tag_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG

  # ═══════════════════════════════════════════════════════════
  # JOB 8 — Dispatch Homebrew tap update
  # ═══════════════════════════════════════════════════════════
  bump_homebrew_formula:
    name: "🍺 Update Homebrew tap"
    needs: [details, github_release, pypi_publish]
    runs-on: ubuntu-latest
    environment:
      name: release

    steps:
      # ── Build the payload values FIRST as env vars ────────
      # FIX: GitHub Actions does NOT resolve step-level env in
      # `with:` blocks. Compute everything in a prior step and
      # expose via GITHUB_OUTPUT so it's available in `with:`.
      - name: Compute formula payload
        id: formula
        run: |
          VERSION="${{ needs.details.outputs.new_version }}"
          TAG="${{ needs.details.outputs.tag_name }}"
          URL="https://github.com/${{ env.OWNER }}/${{ env.PACKAGE_NAME }}/releases/download/${TAG}/${{ env.PACKAGE_NAME }}-${VERSION}.tar.gz"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL"         >> "$GITHUB_OUTPUT"
          echo "name=${{ env.PACKAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Dispatch update to Homebrew tap
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.BREW_TAP_TOKEN }}
          repository: ${{ env.OWNER }}/${{ env.TAP_NAME }}
          event-type: "update-formula"
          # ✅ Values now come from step outputs, not step-level env
          client-payload: |
            {
              "formula_name":    "${{ steps.formula.outputs.name }}",
              "formula_version": "${{ steps.formula.outputs.version }}",
              "formula_url":     "${{ steps.formula.outputs.url }}"
            }

  # ═══════════════════════════════════════════════════════════
  # JOB 9 — Notify on failure (any job)
  # ═══════════════════════════════════════════════════════════
  notify_failure:
    name: "🔔 Notify on failure"
    # Run only if any upstream job failed AND this isn't itself failing
    needs:
      - details
      - check_pypi
      - quality
      - test
      - build
      - pypi_publish
      - github_release
      - bump_homebrew_formula
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ Release pipeline failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field   | Value |"            >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag     | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit  | \`${{ github.sha }}\` |"      >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor   | @${{ github.actor }} |"        >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> "$GITHUB_STEP_SUMMARY"