# ============================================================
#  landsat9geo — Continuous Integration
#  Runs on every push to main and every pull request.
#  This is the fast feedback loop — NOT the release pipeline.
# ============================================================

name: ci

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:          # skip docs-only changes
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel stale runs on force-push

env:
  PYTHON_VER: "3.12"

jobs:
  # ── Lint & format (fastest gate, runs alone first) ────────
  lint:
    name: "🔬 Lint & format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ── Full test matrix ──────────────────────────────────────
  test:
    name: "🧪 Test (py${{ matrix.python-version }} / ${{ matrix.os }})"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev deps
        run: pip install ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=landsat9geo \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage XML (Ubuntu / 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # ── Verify the package builds cleanly ─────────────────────
  build_check:
    name: "🏗️  Build check"
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Verify with twine
        run: twine check --strict dist/*

      - name: Smoke-test CLI
        run: |
          pip install dist/*.whl
          landsat9geo --help
