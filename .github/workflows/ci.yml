# ============================================================
#  landsat9geo — Continuous Integration (resilient version)
#  Runs on every push to main and every pull request.
#  Gracefully handles: missing tests, missing CLI, missing extras
# ============================================================

name: ci

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:          # skip docs-only changes
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel stale runs on force-push

env:
  PYTHON_VER: "3.12"

jobs:
  # ── Lint & format (fastest gate, runs alone first) ────────
  lint:
    name: "🔬 Lint & format"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ── Tests (Ubuntu only for speed, add Windows later) ──────
  test:
    name: "🧪 Test (py${{ matrix.python-version }})"
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev deps
        # Fall back to base install if [dev] extras aren't defined yet
        run: pip install ".[dev]" 2>/dev/null || pip install -e . && pip install pytest pytest-cov

      - name: Check for test files
        id: check_tests
        run: |
          if [ -d "tests" ] && [ "$(ls tests/test_*.py 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "has_tests=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No test files found — skipping pytest."
          fi

      - name: Run pytest with coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=landsat9geo \
            --cov-report=term-missing

      # Always verify the package at least imports cleanly
      - name: Smoke test — import
        run: python -c "import landsat9geo; print('✅ Import OK')"

  # ── Verify the package builds cleanly ─────────────────────
  build_check:
    name: "🏗️  Build check"
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Verify with twine
        run: twine check --strict dist/*

      - name: Smoke-test CLI (if entry point exists)
        run: |
          pip install dist/*.whl
          if command -v landsat9geo &> /dev/null; then
            landsat9geo --help
          else
            echo "::notice::No CLI entry point found — skipping."
          fi